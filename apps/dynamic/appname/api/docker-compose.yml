services:
  app_api_blue:
    image: registry.yourname.com/app-api:${BLUE_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env
      - /home/applepie/serverreleases/dynamic/app/api/blue.env
    volumes:
      - /home/applepie/serverdata/uploads/app:/uploads
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

  app_api_green:
    image: registry.yourname.com/app-api:${GREEN_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env
      - /home/applepie/serverreleases/dynamic/app/api/green.env
    volumes:
      - /home/applepie/serverdata/uploads/app:/uploads
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

networks:
  web:
    name: web
    external: true